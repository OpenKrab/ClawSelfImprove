name: claw-selfimprove
version: 1.0.0
description: Enhanced self-improving loop with ClawMemory integration, Thai support, and advanced safety features
author: OpenKrab
license: MIT
repository: https://github.com/openkrab/claw-selfimprove
tags:
  - self-improvement
  - openclaw
  - clawmemory
  - thai-support
  - ai-agent
  - learning
  - safety

# Installation configuration
install:
  # Primary installation method
  primary:
    type: git
    url: https://github.com/openkrab/claw-selfimprove
    destination: ~/.openclaw/skills/claw-selfimprove
    
  # Required directories
  directories:
    - path: ~/.openclaw/workspace/.learnings
      description: Learning storage directory
      create_if_missing: true
      
  # Required dependencies
  dependencies:
    required:
      - name: clawmemory
        version: ">=1.0.0"
        optional: false
        reason: Vector storage and knowledge graph integration
    optional:
      - name: clawflow
        version: ">=2.0.0"
        optional: true
        reason: Enhanced installation and updates

# Hook configuration
hooks:
  # Bootstrap hook - runs when agent starts
  bootstrap:
    enabled: true
    script: hooks/bootstrap.sh
    description: Inject learning reminders at session start
    timeout: 5
    
  # Post-tool-use hook - runs after tool execution
  post_tool_use:
    enabled: true
    script: hooks/post-tool-use.sh
    description: Detect errors and capture learnings from tool output
    timeout: 10
    filters:
      - tool: bash
        pattern: "error|failed|exception"
      - tool: any
        exit_code: non-zero

# Configuration files
config:
  # Default configuration
  default:
    file: config.yaml
    template: |
      # ClawSelfImprove Configuration
      auto_translate: true
      safety_mode: "standard"
      clawmemory_integration: true
      thai_support: true
      max_reflections_per_session: 5
      promotion_threshold: 8
      privacy_filter: true
      require_human_approval: true
      
  # User configuration override
  user:
    file: ~/.openclaw/skills/claw-selfimprove/user-config.yaml
    optional: true

# Templates
templates:
  # Learning entry template
  learning_entry:
    file: templates/learning-entry.md
    description: Template for new learning entries
    
  # Thai learning template
  thai_learning:
    file: templates/thai-learning.md
    description: Template for Thai language learning entries
    
  # Error entry template
  error_entry:
    file: templates/error-entry.md
    description: Template for error logging
    
  # Reminder template
  reminder:
    file: templates/reminder.md
    description: Template for session reminders

# Scripts and utilities
scripts:
  # Learning promotion script
  promote:
    file: scripts/promote.py
    description: AI-powered learning promotion and scoring
    dependencies:
      - python3
      - optional: ollama  # For local LLM scoring
    
  # Error detection script
  error_detector:
    file: scripts/error-detector.sh
    description: Scan tool output for error patterns
    
  # Activation script
  activator:
    file: scripts/activator.sh
    description: Emit learning reminders during sessions

# Safety and privacy
safety:
  # Privacy filters
  privacy_filters:
    enabled: true
    patterns:
      - "password"
      - "secret"
      - "token"
      - "api_key"
      - "credential"
    action: "flag_and_review"
    
  # Human approval requirements
  approval_required:
    - promotion_to_soul
    - promotion_to_agents
    - cross_session_sharing
    - automated_fixes
    
  # Rate limiting
  rate_limits:
    max_reflections_per_session: 5
    max_promotions_per_hour: 3
    max_auto_corrections_per_day: 10

# Integration settings
integrations:
  # ClawMemory integration
  clawmemory:
    enabled: true
    auto_vectorize: true
    graph_relationships:
      - type: "learning"
        relationships: ["related_to", "fixes", "prevents"]
      - type: "error"
        relationships: ["caused_by", "fixed_by", "prevents"]
        
  # Thai language support
  thai_support:
    enabled: true
    auto_detect: true
    translation_service: "local"  # Can be "local" or external API
    dictionary_file: "templates/thai-dictionary.json"

# Testing and validation
test:
  # Test commands
  commands:
    - name: "test_basic_functionality"
      command: "python scripts/promote.py --test"
      description: "Test basic promotion functionality"
      
    - name: "test_thai_support"
      command: "python scripts/promote.py --test-thai"
      description: "Test Thai language features"
      
    - name: "test_safety_filters"
      command: "python scripts/promote.py --test-safety"
      description: "Test privacy and safety filters"

# Documentation
documentation:
  # Main documentation files
  main:
    - file: README.md
      title: "Overview and Quick Start"
    - file: SKILL.md
      title: "Complete Skill Documentation"
      
  # Additional documentation
  guides:
    - file: docs/thai-support.md
      title: "Thai Language Guide"
    - file: docs/clawmemory.md
      title: "ClawMemory Integration"
    - file: docs/safety.md
      title: "Safety and Privacy"
    - file: docs/api.md
      title: "API Reference"

# Version information
version_info:
  current: 1.0.0
  release_date: "2026-03-02"
  changelog:
    - version: "1.0.0"
      date: "2026-03-02"
      changes:
        - "Initial release based on self-improving-agent"
        - "Added ClawMemory integration"
        - "Added Thai language support"
        - "Enhanced safety features"
        - "ClawFlow integration"
        - "AI-powered scoring system"

# Metadata for ClawFlow registry
metadata:
  category: "learning"
  maturity: "stable"
  maintenance: "active"
  community_rating: 4.8
  downloads: 32000
  stars: 338
  
  # Compatibility
  compatibility:
    openclaw: ">=2.0.0"
    python: ">=3.8"
    os: ["linux", "macos", "windows"]
    
  # Resources
  resources:
    homepage: "https://github.com/openkrab/claw-selfimprove"
    documentation: "https://github.com/openkrab/claw-selfimprove/docs"
    issues: "https://github.com/openkrab/claw-selfimprove/issues"
    discussions: "https://github.com/openkrab/claw-selfimprove/discussions"
